name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: eu-central-1
      ECR_REPOSITORY_URL: 778346328525.dkr.ecr.eu-central-1.amazonaws.com/sandbox-power-monitor
      AWS_ROLE_TO_ASSUME: arn:aws:iam::778346328525:role/sandbox-power-monitor-ecr-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY_URL }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
